<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA_PAY - Voice Payment Assistant</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 30px;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    margin: auto;
}

button {
    padding: 15px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.voice-btn {
    background: #00c6ff;
    color: white;
}

.confirm-btn {
    background: #00b894;
    color: white;
}

.cancel-btn {
    background: #d63031;
    color: white;
}

.output {
    margin-top: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🛡️ NOVA_PAY</h1>
    <p>Voice-First AI Payment Assistant</p>

    <button class="voice-btn" onclick="startListening()">🎙️ Speak Payment</button>

    <div class="output" id="output">
        Waiting for voice command...
    </div>

    <div id="actions" style="display:none;">
        <button class="confirm-btn" onclick="authenticate()">✅ Confirm & Authenticate</button>
        <button class="cancel-btn" onclick="cancelTransaction()">❌ Cancel</button>
    </div>
</div>

<script>
let amount = 0;
let recipient = "";
let trustScore = 100;

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}

function startListening() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-IN";
    recognition.start();

    recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        document.getElementById("output").innerHTML = "You said: " + transcript;
        processCommand(transcript);
    };
}

function processCommand(text) {
    const amountMatch = text.match(/(\d+)/);
    if (amountMatch) {
        amount = parseInt(amountMatch[0]);
    }

    const words = text.split("to ");
    if (words.length > 1) {
        recipient = words[1];
    }

    if (amount > 0 && recipient !== "") {
        evaluateRisk();
    } else {
        speak("Sorry, I could not understand the payment details.");
    }
}

function evaluateRisk() {
    // Simple demo logic
    if (amount > 5000) {
        trustScore = 40;
    } else {
        trustScore = 90;
    }

    if (trustScore < 50) {
        speak("Warning! This transaction seems unusual. Please confirm carefully.");
    } else {
        speak("You are sending " + amount + " rupees to " + recipient + ". Please confirm.");
    }

    document.getElementById("actions").style.display = "block";
}

function authenticate() {
    let confirmBio = confirm("Simulate biometric authentication?");
    if (confirmBio) {
        completeTransaction();
    } else {
        speak("Authentication failed.");
    }
}

function completeTransaction() {
    speak("Payment of " + amount + " rupees to " + recipient + " is successful.");
    document.getElementById("output").innerHTML = 
        "✅ Payment Successful! <br>Amount: ₹" + amount + "<br>Recipient: " + recipient;
    document.getElementById("actions").style.display = "none";
}

function cancelTransaction() {
    speak("Transaction cancelled.");
    document.getElementById("output").innerHTML = "Transaction Cancelled.";
    document.getElementById("actions").style.display = "none";
}
</script>

</body>
</html>
